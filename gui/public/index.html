<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <span class="logo">⚡ Bot Manager</span>
      <span id="srv-badge" class="badge badge-muted">● Connecting…</span>
    </div>
    <button id="btn-add" class="btn btn-primary">+ New Bot</button>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="main">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state hidden">
      <div class="empty-icon">🤖</div>
      <p>No bots configured yet.</p>
      <button id="btn-add-empty" class="btn btn-primary">Add your first bot</button>
    </div>
  </main>

  <!-- ── Log panel ─────────────────────────────────────────────────────── -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">Event Log</span>
      <button id="btn-clear-log" class="btn btn-ghost btn-xs">Clear</button>
    </div>
    <div id="log" class="log-body"></div>
  </div>

  <!-- ── Modal ──────────────────────────────────────────────────────────── -->
  <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">

      <div class="modal-header">
        <h2 id="modal-title">New Bot</h2>
        <button id="btn-modal-close" class="modal-close" aria-label="Close">×</button>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="settings">Settings</button>
        <button class="tab"        data-tab="code">Profile Code</button>
      </nav>

      <!-- Settings pane -->
      <div id="pane-settings" class="pane">
        <form id="form" autocomplete="off" novalidate>

          <div class="field-row">
            <label for="f-label">Display Name</label>
            <input id="f-label" name="label" type="text" placeholder="My Sentinel Bot" required>
          </div>

          <div class="field-row">
            <label for="f-profile">Profile Template</label>
            <select id="f-profile" name="profile"></select>
            <span class="field-hint">Determines triggers &amp; actions. Edit code in the Profile Code tab.</span>
          </div>

          <div class="field-row">
            <label for="f-username">Username / Email</label>
            <input id="f-username" name="username" type="text" placeholder="account@outlook.com">
            <span class="field-hint">Microsoft account email used for authentication.</span>
          </div>

          <div class="field-row-2">
            <div class="field-row">
              <label for="f-host">Server Host</label>
              <input id="f-host" name="host" type="text" placeholder="donutsmp.net">
            </div>
            <div class="field-row">
              <label for="f-port">Port</label>
              <input id="f-port" name="port" type="number" min="1" max="65535" placeholder="25565">
            </div>
          </div>

          <div class="field-row">
            <label for="f-auth">Auth Type</label>
            <select id="f-auth" name="auth">
              <option value="microsoft">Microsoft (OAuth)</option>
              <option value="offline">Offline (username only)</option>
            </select>
          </div>

          <div class="field-row field-row-inline">
            <div class="checkbox-group">
              <input id="f-viewer" name="viewerEnabled" type="checkbox">
              <label for="f-viewer">Enable 3D Viewer</label>
            </div>
            <div class="field-row viewer-port-field">
              <label for="f-vport">Viewer Port</label>
              <input id="f-vport" name="viewerPort" type="number" min="1024" max="65535" placeholder="3000">
            </div>
          </div>

          <div class="field-row">
            <div class="checkbox-group">
              <input id="f-reconnect" name="reconnect" type="checkbox">
              <label for="f-reconnect">Auto-reconnect on unexpected disconnect</label>
            </div>
          </div>

        </form>
      </div>

      <!-- Profile Code pane -->
      <div id="pane-code" class="pane hidden">
        <div class="code-toolbar">
          <div class="field-row" style="flex:1;margin:0">
            <label for="code-sel">Editing profile:</label>
            <select id="code-sel"></select>
          </div>
          <div class="code-save-group">
            <button id="btn-save-code" class="btn btn-primary btn-sm">Save</button>
            <span id="code-status" class="code-status"></span>
          </div>
        </div>
        <p class="code-hint">Changes take effect on the next <strong>Connect</strong>. Be careful — syntax errors will prevent the bot from loading.</p>
        <textarea id="code-editor" class="code-editor" spellcheck="false"></textarea>
      </div>

      <div id="modal-footer" class="modal-footer">
        <button id="btn-delete" class="btn btn-danger hidden">Delete Bot</button>
        <div class="footer-spacer"></div>
        <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
        <button id="btn-save"   class="btn btn-primary">Save</button>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
